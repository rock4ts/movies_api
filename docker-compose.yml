volumes:
  esdata:

services:
  elastic-db:
    build: elastic
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./elastic/es_dump:/usr/share/elasticsearch/snapshots
    healthcheck:
      test: curl -s http://elastic-db:9200  >/dev/null || exit 1
      interval: 20s
      timeout: 20s
      retries: 5
    restart: unless-stopped 

  redis:
    image: redis:alpine

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env     
    depends_on:
      elastic-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped 

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/core:/etc/nginx/conf.d:ro
    depends_on:
      - fastapi
    restart: unless-stopped
