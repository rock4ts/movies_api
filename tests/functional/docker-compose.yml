volumes:
  esdata:

services:
  elastic-db:
    image: "elasticsearch:8.6.2"
    ports:
      - "9200:9200"
    environment:
      ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      cluster.routing.allocation.disk.watermark.low: "90%"
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  fastapi:
    extends:
      file: ../../docker-compose.yml
      service: fastapi
    ports:
      - "8000:8000"
    environment:
      - ELASTIC_HOST=elastic-db
      - REDIS_HOST=redis
    restart: unless-stopped
    command: ["gunicorn", "-w", "4", "-k", "uvicorn.workers.UvicornWorker", "main:app", "--bind", "0.0.0.0:8000"]

  tests:
    build: .
    environment:
      - ELASTIC_HOST=elastic-db
      - REDIS_HOST=redis
      - FASTAPI_HOST=fastapi
    restart: "no"
    command: >
      /scripts/wait-for-it.sh elastic-db:9200 -s -t 60 --
      /scripts/wait-for-it.sh redis:6379 -s -t 60 --
      pytest src