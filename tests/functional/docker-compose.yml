volumes:
  esdata:

services:
  elastic-db:
    image: "elasticsearch:8.6.2"
    ports:
      - "9200:9200"
    environment:
      ES_JAVA_OPTS: "-Xms1024m -Xmx1024m"
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      cluster.routing.allocation.disk.watermark.low: "90%"
    healthcheck:
      test: curl -s http://elastic-db:9200  >/dev/null || exit 1
      interval: 20s
      timeout: 20s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  fastapi:
    build: ../../.
    image: fastapi-image
    ports:
      - "8000:8000"
    environment:
      - ELASTIC_HOST=elastic-db
      - REDIS_HOST=redis
    depends_on:
      elastic-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: ["gunicorn", "-w", "4", "-k", "uvicorn.workers.UvicornWorker", "main:app", "--bind", "0.0.0.0:8000"]

  tests:
    image: fastapi-image
    environment:
      - ELASTIC_HOST=elastic-db
      - REDIS_HOST=redis
      - SERVICE_HOST=fastapi
      - JSON_SCHEMA_PATH=/app/tests/functional/elastic/schema
    volumes:
      - ./elastic/schema:/app/tests/functional/elastic/schema  
    depends_on:
      elastic-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: no
    command: ["pytest", "/app/tests/functional/src"]

